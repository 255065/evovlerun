# Railway deployment config for the EvolveRun backend.
# Railway auto-detects Dockerfile, but pinning these makes deploys predictable.

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
# Single replica is plenty for early users — the MCP server is stateless so
# we can scale horizontally later without code changes.
numReplicas = 1
# Restart if the process dies; let Railway handle backoff.
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

# Healthcheck — Railway pings /health after deploy. Match the path/timeout
# to our FastAPI health endpoint.
healthcheckPath = "/health"
healthcheckTimeout = 30

# uvicorn binds to $PORT automatically (see Dockerfile CMD).
